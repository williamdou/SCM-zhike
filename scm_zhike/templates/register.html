<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM智课 - 注册</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container" style="max-width:460px">
        <div class="auth-header">
            <div class="auth-logo">📚</div>
            <h1>注册新账号</h1>
            <p>加入SCM智课学习平台</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container">
            {% for cat, msg in messages %}
            <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>身份 <span class="required">*</span></label>
                <select name="role" required>
                    <option value="student">学生</option>
                    <option value="teacher">教师</option>
                </select>
            </div>
            <div class="form-group">
                <label>真实姓名 <span class="required">*</span></label>
                <input type="text" name="realname" required placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label>用户名 <span class="required">*</span></label>
                <input type="text" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码 <span class="required">*</span></label>
                <input type="password" name="password" required placeholder="至少6位密码">
            </div>
            <div class="form-group">
                <label>确认密码 <span class="required">*</span></label>
                <input type="password" name="password2" required placeholder="再次输入密码">
            </div>
            <div class="form-group">
                <label>学号</label>
                <input type="text" name="student_id" placeholder="选填">
            </div>
            <div class="form-group">
                <label>年级 <span class="required">*</span></label>
                <select name="grade" required>
                    <option value="">请选择年级</option>
                    <option value="2026级">2026级</option>
                    <option value="2025级">2025级</option>
                    <option value="2024级">2024级</option>
                    <option value="2023级">2023级</option>
                    <option value="2022级">2022级</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>班级</label>
                <input type="text" name="class_name" placeholder="例如：管理科学与工程1班">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>

        <div class="auth-footer">
            <p>已有账号？<a href="{{ url_for('login_page') }}">返回登录</a></p>
        </div>
    </div>
</body>
</html>
