<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ task.name }} - {{ chapter.name }} - SCM智课</title>

<body>

            <a href="{{ url_for('chapter_view', chapter_key=chapter_key) }}" class="nav-brand">← 返回章节</a>

        <div id="practice-area" class="practice-area"><p>正在加载互动实践...</p></div>

<script>
const CHAPTER_KEY = '{{ chapter_key }}';
const CHAPTER_NAME = '{{ chapter.name }}';
const TASK_KEY = '{{ task_key }}';
const TASK_NAME = '{{ task.name }}';
const INPUT_TYPE = '{{ task.input_type }}';

(function() {
    const handlers = {};

    // ---- ch11: Beer Game ----
    handlers['beer_game'] = function() {
        fetch('/api/practice/beer_game/init',{method:'POST'}).then(r=>r.json()).then(s=>renderBeerGame(s));
    };
    handlers['supplier_eval'] = initSupplierEval;
    handlers['facility_location'] = initFacilityLocation;
    handlers['pricing_sim'] = initPricingSim;
    handlers['make_or_buy'] = initMakeOrBuy;
    handlers['delivery_route'] = initDeliveryRoute;
    handlers['risk_scenario'] = initRiskScenario;
    handlers['scm_map'] = initScmMap;
    handlers['vertical_vs_outsource'] = initVerticalVsOutsource;
    handlers['tech_assessment'] = initTechAssessment;
    handlers['fisher_match'] = initFisherMatch;
    handlers['info_sharing'] = initInfoSharing;
    handlers['postponement'] = initPostponement;
    handlers['info_value'] = initInfoValue;
    handlers['production_schedule'] = initProductionSchedule;
    handlers['scor_kpi'] = initScorKpi;

    const area = document.getElementById('practice-area');
    if (handlers[TASK_KEY]) {
        handlers[TASK_KEY]();
    } else {
        area.innerHTML = '<div class="content-card"><h3>📝 动手实践任务</h3><p>{{ task.description }}</p><p><strong>互动形式：</strong>{{ task.evaluation }}</p><div class="practice-note"><p>💡 请在课堂上在教师指导下完成此任务。</p></div></div>';
    }
})();

async function saveResult(score, detail) {
    try {
        await fetch('/api/practice/save_result', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chapter: CHAPTER_NAME, task_name: TASK_NAME, score, detail})
        });
    } catch(e) {}
}

// ============================================================
// ch01: SCM Map - Supply Chain Mapping
// ============================================================
function initScmMap() {
    const area = document.getElementById('practice-area');
    area.innerHTML = `
        <div class="content-card">
            <h3>🗺️ 绘制供应链地图</h3>
            <p>选择一款你日常使用的产品，识别它的供应链包含哪些环节。</p>
            <div class="form-group"><label>你选择的产品：</label><input type="text" id="scm-product" placeholder="例如：iPhone、瑞幸咖啡、Nike运动鞋"></div>
            <div class="form-group"><label>原材料供应商：</label><input type="text" id="comp-suppliers" placeholder="列出关键原材料及其来源"></div>
            <div class="form-group"><label>制造商/加工厂：</label><input type="text" id="comp-manufacturers" placeholder="核心零部件或成品制造商"></div>
            <div class="form-group"><label>分销商/批发商：</label><input type="text" id="comp-distributors" placeholder="区域分销或批发环节"></div>
            <div class="form-group"><label>零售商/销售渠道：</label><input type="text" id="comp-retailers" placeholder="消费者购买的渠道"></div>
            <div class="form-group"><label>物流服务商：</label><input type="text" id="comp-logistics" placeholder="运输、仓储、配送服务"></div>
            <div class="form-group"><label>信息流传导：</label><input type="text" id="comp-info_flow" placeholder="订单、预测、库存信息如何传递"></div>
            <div class="form-group"><label>资金流方向：</label><input type="text" id="comp-cash_flow" placeholder="付款及资金流向"></div>
            <button class="btn btn-primary btn-lg" onclick="runScmMap()">提交分析</button>
            <div id="scm-map-result"></div>
        </div>`;
}

async function runScmMap() {
    const components = {
        suppliers: document.getElementById('comp-suppliers').value,
        manufacturers: document.getElementById('comp-manufacturers').value,
        distributors: document.getElementById('comp-distributors').value,
        retailers: document.getElementById('comp-retailers').value,
        logistics: document.getElementById('comp-logistics').value,
        info_flow: document.getElementById('comp-info_flow').value,
        cash_flow: document.getElementById('comp-cash_flow').value,
    };
    const product = document.getElementById('scm-product').value;
    const resp = await fetch('/api/practice/scm_map/check', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({components, product})
    });
    const data = await resp.json();
    await saveResult(data.score, {components, product});
    document.getElementById('scm-map-result').innerHTML = `<h3>📊 分析结果 (得分: ${data.score})</h3><pre style="white-space:pre-wrap">${data.feedback}</pre>`;
}

        {key:'rfid',name:'RFID全链追踪',desc:'每个商品贴RFID标签，实现全程可视化追踪'},
        {key:'digital_twin',name:'数字孪生',desc:'构建供应链虚拟副本，模拟和优化决策'},
        {key:'blockchain',name:'区块链溯源',desc:'利用区块链记录每件商品的全程流转'},
        {key:'drone',name:'无人机配送',desc:'使用无人机进行末端配送'},
        {key:'d_printing',name:'3D打印备件',desc:'门店现场3D打印维修备件'},
    ];
    area.innerHTML = `
        <div class="content-card">
            <h3>🔮 技术趋势评估矩阵</h3>
            <p>一家食品零售企业（类似盒马/永辉）有6项新技术候选。请按照"投资回报优先级"排序（拖动滑块调整优先级，1=最重要）：</p>
            ${techs.map(t => `
            <div class="weight-item">
                <label style="width:140px">${t.name}</label>
                <input type="range" min="1" max="6" value="${techs.indexOf(t)+1}" id="rank-${t.key}" oninput="document.getElementById('v-${t.key}').textContent=this.value">
                <span id="v-${t.key}" style="width:20px">${techs.indexOf(t)+1}</span>
                <small style="color:#666">${t.desc}</small>
            </div>`).join('')}
            <button class="btn btn-primary btn-lg" onclick="runTechAssessment()">提交排序</button>
            <div id="tech-result"></div>
        </div>`;
}

async function runTechAssessment() {
    const ranking = ['ai_forecast','rfid','digital_twin','blockchain','drone','d_printing']
        .map(k => ({key:k, rank:parseInt(document.getElementById('rank-'+k).value)}))
        .sort((a,b) => a.rank - b.rank)
        .map(x => x.key);
    const resp = await fetch('/api/practice/tech_assessment/check', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ranking})
    });
    const data = await resp.json();
    await saveResult(data.score, {ranking});
    document.getElementById('tech-result').innerHTML = `
        <h3>📊 评估结果 (得分: ${data.score}, 相关性: ${data.correlation})</h3>
        <p>${data.analysis}</p>
        <h4>专家基准排序：</h4>
        <ol>${data.expert_ranking.map(r => `<li><strong>${r.name}</strong>——${r.reason}</li>`).join('')}</ol>`;
}

// ============================================================
// ch04: Fisher Matrix Matching
// ============================================================
function initFisherMatch() {
    const area = document.getElementById('practice-area');
    const products = [
        {key:'furniture',name:'高端定制家具',desc:'需求不确定、利润率高、生命周期长'},
        {key:'water',name:'品牌瓶装水',desc:'需求稳定、利润率低、生命周期长'},
        {key:'phone',name:'新款智能手机',desc:'需求高度不确定、利润率高、生命周期短(<1年)'},
        {key:'screw',name:'标准工业螺丝',desc:'需求极稳定、利润率极低、生命周期极长'},
    ];
    area.innerHTML = `
        <div class="content-card">
            <h3>🎯 Fisher矩阵实战匹配</h3>
            <p>为以下4种产品选择最匹配的供应链类型：<strong>效率型</strong>(效率优先、成本最低化) 或 <strong>响应型</strong>(速度优先、弹性最大化)</p>
            ${products.map(p => `
            <div class="content-card">
                <strong>${p.name}</strong>：${p.desc}
                <div class="option-group">
                    <button class="btn btn-lg" id="btn-${p.key}-eff" onclick="selectFisher('${p.key}','efficient')">⚡ 效率型</button>
                    <button class="btn btn-lg" id="btn-${p.key}-resp" onclick="selectFisher('${p.key}','responsive')">🚀 响应型</button>
                </div>
            </div>`).join('')}
            <button class="btn btn-primary btn-lg" onclick="runFisherMatch()">提交匹配</button>
            <div id="fisher-result"></div>
        </div>`;
    window._fisherSelections = {};
    window.selectFisher = function(key, type) {
        window._fisherSelections[key] = type;
        document.querySelectorAll(`[id^=btn-${key}]`).forEach(b => b.style.borderColor = '#ddd');
        document.getElementById(`btn-${key}-${type === 'efficient' ? 'eff' : 'resp'}`).style.borderColor = '#2196F3';
        document.getElementById(`btn-${key}-${type === 'efficient' ? 'eff' : 'resp'}`).style.background = '#E3F2FD';
    };
}

async function runFisherMatch() {
    const matches = window._fisherSelections || {};
    const resp = await fetch('/api/practice/fisher_match/check', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({matches})
    });
    const data = await resp.json();
    await saveResult(data.score, {matches});
    document.getElementById('fisher-result').innerHTML = `
        <h3>📊 匹配结果 (得分: ${data.score}, 正确: ${data.correct_count}/${data.total})</h3>
        <p>${data.feedback}</p>
        ${data.details.map(d => `<div class="content-card" style="border-left:4px solid ${d.is_correct?'#4CAF50':'#F44336'}">
            <strong>${d.name}</strong>：你选${d.student==='efficient'?'效率型':'响应型'} | 正确答案：${d.correct==='efficient'?'效率型':'响应型'} ${d.is_correct?'✅':'❌'}<br><small>${d.reason}</small>
        </div>`).join('')}`;
}

// ============================================================
// ch05: Information Sharing Experiment
// ============================================================
function initInfoSharing() {
    const area = document.getElementById('practice-area');
    area.innerHTML = `
        <div class="content-card">
            <h3>📡 信息共享价值实验</h3>
            <p>实验对比两种情境：<strong>第1阶段</strong>(无信息共享)上游仅根据你的订货量推测需求。 <strong>第2阶段</strong>(有信息共享)上游看到你的真实需求。</p>
            <p>你扮演零售商，面对波动的市场需求做出订货决策。每个阶段5轮。</p>
            <div id="info-sharing-game">
                <div class="option-group">
                    <button class="btn btn-lg btn-primary" onclick="startInfoPhase(1)">🔴 第1阶段：无信息共享</button>
                    <button class="btn btn-lg btn-outline" onclick="startInfoPhase(2)">🟢 第2阶段：有信息共享</button>
                </div>
            </div>
        </div>`;
    window._infoPhaseResults = {1: [], 2: []};
    window._infoRoundState = {phase: 1, round: 0};
}

function startInfoPhase(phase) {
    window._infoRoundState = {phase, round: 0};
    window._infoPhaseResults[phase] = [];
    playInfoRound();
}

async function playInfoRound() {
    const state = window._infoRoundState;
    const area = document.getElementById('info-sharing-game');
    if (state.round >= 5) {
        showInfoResults();
        return;
    }
    area.innerHTML = `
        <h4>${state.phase === 1 ? '🔴 第1阶段：无信息共享' : '🟢 第2阶段：有信息共享'} —— 第 ${state.round + 1}/5 轮</h4>
        <p>第${state.round+1}周，你观察到需求为 <strong>${[100,105,95,110,90][state.round]} 箱</strong></p>
        <div class="game-action">
            <input type="number" id="info-order" value="${[100,105,95,110,90][state.round]}" min="50" max="200">
            <button class="btn btn-primary btn-lg" onclick="submitInfoRound()">提交订货量</button>
        </div>`;
}

async function submitInfoRound() {
    const state = window._infoRoundState;
    const orderQty = parseInt(document.getElementById('info-order').value) || 100;
    const resp = await fetch('/api/practice/info_sharing/run', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({phase: state.phase, order_qty: orderQty, round: state.round})
    });
    const data = await resp.json();
    window._infoPhaseResults[state.phase].push(data);
    window._infoRoundState.round = data.round;

    const area = document.getElementById('info-sharing-game');
    area.innerHTML = `
        <h4>${data.phase_label} —— 第 ${data.round}/${data.max_rounds} 轮结果</h4>
        <table class="game-table">
            <tr><td>实际需求</td><td>${data.demand} 箱</td></tr>
            <tr><td>你的订货量</td><td>${data.your_order} 箱</td></tr>
            <tr><td>上游响应订单</td><td>${data.upstream_order} 箱</td></tr>
            <tr><td>放大系数</td><td><strong>${data.amplification}×</strong></td></tr>
        </table>
        <p>${data.analysis}</p>
        ${data.game_over ?
            `<button class="btn btn-primary btn-lg" onclick="${state.phase===1?'startInfoPhase(2)':'showInfoResults()'}">${state.phase===1?'进入第2阶段 (有信息共享)':'查看完整对比结果'}</button>` :
            `<button class="btn btn-primary btn-lg" onclick="playInfoRound()">下一轮</button>`}`;
}

function showInfoResults() {
    const p1 = window._infoPhaseResults[1] || [];
    const p2 = window._infoPhaseResults[2] || [];
    const avg1 = p1.length ? p1.reduce((s,r)=>s+r.amplification,0)/p1.length : 0;
    const avg2 = p2.length ? p2.reduce((s,r)=>s+r.amplification,0)/p2.length : 0;

    let html = `<div class="content-card"><h3>📊 实验结果对比</h3>
        <table class="game-table">
            <tr><th>阶段</th><th>各轮放大系数</th><th>平均放大系数</th></tr>
            <tr><td>🔴 无信息共享</td><td>${p1.length?p1.map(r=>r.amplification+'×').join(', '):'未运行'}</td><td><strong>${avg1.toFixed(2)}×</strong></td></tr>
            <tr><td>🟢 有信息共享</td><td>${p2.length?p2.map(r=>r.amplification+'×').join(', '):'未运行'}</td><td><strong>${avg2.toFixed(2)}×</strong></td></tr>
        </table>
        <p>${avg2>0 && avg1>avg2 ? '✅ 信息共享确实缓解了牛鞭效应！订货量波动幅度明显降低。' : ''}</p>
        <div class="game-reflection"><h3>💡 思考题</h3><ol><li>信息共享为什么能减少牛鞭效应？</li><li>实际供应链中为什么企业仍然不愿意共享真实需求信息？</li><li>除了信息共享，还有哪些方法可以缓解牛鞭效应？</li></ol></div></div>`;

    const area = document.getElementById('info-sharing-game');
    area.innerHTML = html;
    if (p1.length && p2.length) {
        const score = Math.round(Math.min(100, Math.max(30, (avg1 - avg2) * 200 + 50)));
        saveResult(score, {phase1: p1, phase2: p2, avg1, avg2});
    }
}

function updateWeights() {
    const keys = ['price','quality','delivery','tech','service'];

    const el = document.getElementById('weight-total');
    el.textContent = '总和：'+total+'%';
    el.style.color = total===100?'green':'red';
}

function renderBeerGame(state) {
    const area = document.getElementById('practice-area');

    area.innerHTML = `<div class="beer-game"><div class="game-header"><h3>🍺 啤酒游戏——第 ${state.round+1}/${state.max_rounds} 轮</h3><p>你是零售商。订货后2周到货。目标：满足需求+最小化成本。</p></div>
        <div class="game-stats"><div class="stat-card"><div class="stat-value">${state.current_demand}</div><div class="stat-label">本周需求</div></div><div class="stat-card"><div class="stat-value">${state.inventory}</div><div class="stat-label">当前库存</div></div><div class="stat-card"><div class="stat-value">${state.pending_orders[0]}</div><div class="stat-label">下周到货</div></div><div class="stat-card"><div class="stat-value">¥${state.total_cost}</div><div class="stat-label">累计成本</div></div></div>
        <div class="game-info"><p>📦 持有成本：5元/箱/周 | 📉 缺货成本：20元/箱 | 历史需求：${state.demand_history.join('→')}</p></div>
        <div class="game-action"><label>订货量（箱）：</label><input type="number" id="order-qty" value="${Math.round(state.current_demand)}" min="0" max="500"><button class="btn btn-primary btn-lg" onclick="playBeerGameRound()">确认订货</button></div></div>`;
}

async function playBeerGameRound() {
    const orderQty = parseInt(document.getElementById('order-qty').value) || 100;
    const initResp = await fetch('/api/practice/beer_game/init',{method:'POST'});
    let state = await initResp.json();
    const history = JSON.parse(sessionStorage.getItem('beer_game_history')||'[]');
    state.round = history.length;
    state.total_cost = history.reduce((s,h)=>s+h.round_cost,0);
    const playResp = await fetch('/api/practice/beer_game/play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...state,order_qty:orderQty,inventory:history.length>0?history[history.length-1].ending_inventory:state.inventory,pending_orders:history.length>0?history[history.length-1].pending_orders:state.pending_orders,current_demand:history.length>0?history[history.length-1].next_demand:state.current_demand,demand_history:history.length>0?history[history.length-1].demand_history||state.demand_history:state.demand_history})});
    const result = await playResp.json();
    history.push(result);
    sessionStorage.setItem('beer_game_history',JSON.stringify(history));
    if (result.game_over) {
        const avgCost = history.reduce((s,h)=>s+h.round_cost,0)/history.length;
        await saveResult(Math.round(Math.min(100,Math.max(0,100-avgCost/5))),{rounds:history});
        showBeerGameResults({history,total_cost:result.total_cost});
    } else {
        renderBeerGame({...state,round:result.round,inventory:result.ending_inventory,current_demand:result.next_demand,pending_orders:result.pending_orders,total_cost:result.total_cost,game_over:false,demand_history:[...state.demand_history,state.current_demand]});
    }
}

function showBeerGameResults(data) {
    const hist = data.history||[];
    document.getElementById('practice-area').innerHTML = `<div class="beer-game"><div class="game-header"><h3>🍺 游戏结束！</h3><p>观察订货量波动 vs 需求波动——这是牛鞭效应。</p></div>
        <table class="game-table"><tr><th>轮次</th><th>需求</th><th>订货量</th><th>到货量</th><th>期末库存</th><th>缺货</th><th>成本</th></tr>${hist.map((h,i)=>`<tr><td>${i+1}</td><td>${h.demand}</td><td>${h.order_qty}</td><td>${h.arrival}</td><td>${h.ending_inventory}</td><td>${h.stockout}</td><td>¥${h.round_cost}</td></tr>`).join('')}<tr class="total-row"><td colspan="6"><strong>累计总成本</strong></td><td><strong>¥${data.total_cost}</strong></td></tr></table>

        <a href="/chapter/ch11_inventory" class="btn btn-outline">返回章节</a></div>`;
    new Chart(document.getElementById('beer-chart').getContext('2d'),{type:'line',data:{labels:hist.map((_,i)=>`第${i+1}轮`),datasets:[{label:'实际需求',data:hist.map(h=>h.demand),borderColor:'#4CAF50',tension:0.3},{label:'你的订货量',data:hist.map(h=>h.order_qty),borderColor:'#FF5722',tension:0.3},{label:'库存水平',data:hist.map(h=>h.ending_inventory),borderColor:'#2196F3',tension:0.3}]},options:{responsive:true,plugins:{title:{display:true,text:'牛鞭效应可视化'}}}});
